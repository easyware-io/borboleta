name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Read version from library
        id: version
        run: echo "value=$(node -p "require('./projects/borboleta/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check tag does not already exist
        run: |
          if git rev-parse "v${{ steps.version.outputs.value }}" >/dev/null 2>&1; then
            echo "::error::Tag v${{ steps.version.outputs.value }} already exists"
            exit 1
          fi

      - run: npm ci

      - name: Sync root version
        run: npm version "${{ steps.version.outputs.value }}" --no-git-tag-version --allow-same-version

      - run: npm run build
      - run: npx ng test --no-watch

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit, tag and publish release
        run: |
          git add package.json package-lock.json
          git diff --staged --quiet || git commit -m "chore: release v${{ steps.version.outputs.value }}"
          git tag "v${{ steps.version.outputs.value }}"

      - name: Publish to npm
        working-directory: dist/borboleta
        env:
          NPM_CONFIG_PROVENANCE: true
        run: npm publish

      - name: Bump to next patch version
        run: |
          cd projects/borboleta
          npm version patch --no-git-tag-version
          NEXT=$(node -p "require('./package.json').version")
          cd ../..
          npm version "$NEXT" --no-git-tag-version
          git add package.json package-lock.json projects/borboleta/package.json
          git commit -m "chore: bump to v$NEXT [skip ci]"

      - name: Push
        run: git push origin main --tags

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.value }}" \
            --title "v${{ steps.version.outputs.value }}" \
            --generate-notes \
            --latest
